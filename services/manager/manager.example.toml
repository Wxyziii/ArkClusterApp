# ARK Smart Cluster Manager — example configuration
#
# SAFETY / PRIVACY:
#   This dashboard is intended for PRIVATE access over Tailscale or LAN ONLY.
#   Do NOT port-forward it to the public internet. Keep the default localhost
#   bind unless you have a Tailscale/private interface address to bind to.
#
# Copy this file to `manager.toml` and edit. Do NOT commit a real api_token.
# The api_token can also be supplied via the ARK_MANAGER_API_TOKEN environment
# variable, which OVERRIDES the value here (preferred for real deployments).

[cluster]
name = "Marcel ARK Cluster"
id = "ark-prime-7f3a"
# Cluster data directory. Must be an absolute path; ".." is rejected.
directory = "/srv/ark/cluster"
manager_version = "rust-manager v0.1.0"

[server]
# Default bind is loopback. For Tailscale set this to the tailnet IP (100.x.x.x)
# or "0.0.0.0" ONLY if the host is already firewalled to the tailnet.
bind_address = "127.0.0.1"
port = 8787
# Bearer token required for all /api/* routes. /health needs no token.
# Leave empty here and set ARK_MANAGER_API_TOKEN in the environment instead.
api_token = "change-me-dev-token"

[operations]
# Disabled by default. Enable only on the real private host after reviewing
# configured units and Home protection rules.
systemd_control_enabled = false
backup_enabled = true
rcon_enabled = false
allow_home_manual_stop = false
allow_travel_manual_stop = true
require_confirmation_token = true
travel_scheduler_enabled = false
travel_idle_shutdown_secs = 10800
config_writes_enabled = false
mod_management_enabled = false
maintenance_enabled = false

[paths]
ark_root = "/srv/ark"
backup_root = "/var/lib/ark-cluster-manager/backups"
cluster_dir = "/srv/ark/clusters/main"

[resource_policy]
ram_warn_pct = 70
ram_pressure_pct = 82
ram_emergency_pct = 92
max_travel_servers = 2
empty_shutdown_mins = 10
home_standby_enabled = true
never_stop_with_players = true
home_stops_only_when_empty = true
prefer_active_player_maps = true
auto_restart_home = true

[backup_policy]
before_shutdown = true
before_config_save = true
before_mod_change = true
retention = "Keep 14 daily + 6 weekly, prune older than 60 days"
# Backup output directory (absolute, no "..").
directory = "/srv/ark/backups"

[discord]
# Placeholder only — no bot is started in this phase.
enabled = false
guild = "Apex Survivors"
status_channel = "#ark-status"
# Real token must come from env later; never store it in committed config.
bot_token_env = "ARK_MANAGER_DISCORD_TOKEN"

[rcon]
enabled = false
poll_interval_seconds = 5

# Travel slots. Exactly one slot must have role = "home". The number of slots
# with role = "travel" must not exceed resource_policy.max_travel_servers.
[[travel_slots]]
name = "Home"
role = "home"

[[travel_slots]]
name = "Travel A"
role = "travel"

[[travel_slots]]
name = "Travel B"
role = "travel"

# Read-only server slots. These are the real systemd-backed server positions
# the manager observes in T1.1. Unit names are validated and only read with
# `systemctl show`; no start/stop/restart commands are implemented.
[slots.home]
id = "home"
label = "Home"
map_key = "the-island"
systemd_unit = "ark-server@home.service"
game_port = 7777
query_port = 27015
rcon_port = 27020
save_path = "/srv/ark/server/ShooterGame/Saved/SavedArks/home"
config_path = "/srv/ark/server/ShooterGame/Saved/Config/LinuxServer"
enabled = true
protected = true
home_resource_standby_enabled = true

[slots.home.paths]
save_dir = "/srv/ark/server/ShooterGame/Saved/SavedArks/home"
config_dir = "/srv/ark/server/ShooterGame/Saved/Config/LinuxServer"

[slots.home.rcon]
host = "127.0.0.1"
port = 27020
password_env = "ARK_HOME_RCON_PASSWORD"

[slots.travel_a]
id = "travel-a"
label = "Travel A"
map_key = "ragnarok"
systemd_unit = "ark-server@travel-a.service"
game_port = 7781
query_port = 27016
rcon_port = 27021
enabled = true
protected = false
home_resource_standby_enabled = false

[slots.travel_a.paths]
save_dir = "/srv/ark/server/ShooterGame/Saved/SavedArks/travel-a"
config_dir = "/srv/ark/server/ShooterGame/Saved/Config/LinuxServer"

[slots.travel_a.rcon]
host = "127.0.0.1"
port = 27021
password_env = "ARK_TRAVEL_A_RCON_PASSWORD"

[slots.travel_b]
id = "travel-b"
label = "Travel B"
map_key = "aberration"
systemd_unit = "ark-server@travel-b.service"
game_port = 7785
query_port = 27017
rcon_port = 27022
enabled = true
protected = false
home_resource_standby_enabled = false

[slots.travel_b.paths]
save_dir = "/srv/ark/server/ShooterGame/Saved/SavedArks/travel-b"
config_dir = "/srv/ark/server/ShooterGame/Saved/Config/LinuxServer"

[slots.travel_b.rcon]
host = "127.0.0.1"
port = 27022
password_env = "ARK_TRAVEL_B_RCON_PASSWORD"

# Configured maps. Keys (id) must be unique. Each query/rcon/game port must be
# unique across all maps. Exactly one map should be can_be_home + assigned Home,
# but at minimum one map must declare can_be_home = true.
